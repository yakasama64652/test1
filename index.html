<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #FFF5F5;
    color: #450A0A;
}

.topbar {
    background: linear-gradient(90deg, #E11D48, #be123c);
    color: white;
    padding: 16px;
    font-weight: 600;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 25%;
    background: #2D0A0A;
    color: #FFF5F5;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    background: transparent;
    border: 1px solid #7f1d1d;
    color: #FFF5F5;
    border-radius: 10px;
    cursor: pointer;
}

.sidebar button:hover {
    background: #E11D48;
}

/* MAIN */
.main {
    width: 75%;
    padding: 24px;
}

/* CARD */
.card {
    background: #FFFFFF;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}

.seat {
    background: white;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    border: 1px solid #fecdd3;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(45,10,10,0.7);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal.active {
    display: flex;
}

.modal-box {
    background: white;
    width: 340px;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
}

.modal-box button,
.modal-box input,
.modal-box select {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
}

/* BUTTON COLORS */
.edit { background:#E11D48 !important; color:white; }
.move { background:#7c3aed !important; color:white; }
.delete { background:#dc2626 !important; color:white; }
.closeBtn { background:#450A0A !important; color:white; }

.hidden { display:none; }

</style>
</head>

<body>

<div class="topbar">VA Classroom Dashboard</div>

<div class="container">

<div class="sidebar">
    <h3>Trainer View</h3>
    <button onclick="switchTrainer('Au')">Au</button>
    <button onclick="switchTrainer('Chanie')">Chanie</button>
    <button onclick="switchTrainer('Leo')">Leo</button>
</div>

<div class="main">

<div class="card">
    <h3 id="classTitle"></h3>
    <div class="grid" id="seatGrid"></div>
</div>

</div>
</div>

<!-- ACTION MODAL -->
<div id="actionModal" class="modal">
    <div class="modal-box">
        <h3 id="actionTitle"></h3>

        <button class="edit" onclick="openEdit('name')">Edit Name</button>
        <button class="edit" onclick="openEdit('agency')">Edit Agency</button>
        <button class="move" onclick="openMove()">Move VA</button>
        <button class="delete" onclick="deleteVA()">Delete</button>
        <button class="closeBtn" onclick="closeAction()">Close</button>
    </div>
</div>

<!-- EDIT / MOVE MODAL -->
<div id="editModal" class="modal">
    <div class="modal-box">

        <h3 id="modalTitle">Edit</h3>

        <!-- SINGLE INPUT (USED FOR NAME OR AGENCY ONLY) -->
        <input id="modalInput" placeholder="Enter value">

        <!-- MOVE DROPDOWN -->
        <select id="modalSelect" class="hidden">
            <option value="Au">Au</option>
            <option value="Chanie">Chanie</option>
            <option value="Leo">Leo</option>
        </select>

        <button onclick="confirmModal()">Save</button>
        <button class="closeBtn" onclick="closeEdit()">Cancel</button>

    </div>
</div>

<script>

/* ================= DATA ================= */
let trainers = JSON.parse(localStorage.getItem("va_data")) || {
    Au: [], Chanie: [], Leo: []
};

let currentTrainer = "Au";
let selectedIndex = null;
let mode = "";

/* ================= SAVE ================= */
function save(){
    localStorage.setItem("va_data", JSON.stringify(trainers));
}

/* ================= RENDER ================= */
function render(){
    let grid = document.getElementById("seatGrid");
    grid.innerHTML = "";

    let list = trainers[currentTrainer];
    document.getElementById("classTitle").innerText = currentTrainer;

    for(let i=0;i<10;i++){
        let seat = document.createElement("div");
        seat.className = "seat";

        let va = list[i];

        if(va){
            seat.innerHTML = `<b>${va.name}</b><br>${va.agency}`;
            seat.onclick = () => openAction(i);
        } else {
            seat.innerHTML = "Empty";
        }

        grid.appendChild(seat);
    }
}

/* ================= ACTION MODAL ================= */
function openAction(i){
    selectedIndex = i;
    document.getElementById("actionModal").classList.add("active");
    document.getElementById("actionTitle").innerText =
        trainers[currentTrainer][i].name;
}

function closeAction(){
    document.getElementById("actionModal").classList.remove("active");
}

/* ================= EDIT / MOVE ================= */
function openEdit(type){
    mode = type;

    let input = document.getElementById("modalInput");
    let select = document.getElementById("modalSelect");

    input.classList.remove("hidden");
    select.classList.add("hidden");

    input.value = "";

    document.getElementById("modalTitle").innerText =
        type === "name" ? "Edit Name" : "Edit Agency";

    closeAction();
    document.getElementById("editModal").classList.add("active");
}

function openMove(){
    mode = "move";

    let input = document.getElementById("modalInput");
    let select = document.getElementById("modalSelect");

    input.classList.add("hidden");
    select.classList.remove("hidden");

    document.getElementById("modalTitle").innerText = "Move VA";

    closeAction();
    document.getElementById("editModal").classList.add("active");
}

/* ================= CONFIRM ================= */
function confirmModal(){
    let va = trainers[currentTrainer][selectedIndex];

    let value = document.getElementById("modalInput").value;
    let target = document.getElementById("modalSelect").value;

    if(mode === "name") va.name = value;
    if(mode === "agency") va.agency = value;

    if(mode === "move"){
        trainers[target].push(va);
        trainers[currentTrainer].splice(selectedIndex,1);
        currentTrainer = target;
    }

    save();
    closeEdit();
    render();
}

/* ================= CLOSE ================= */
function closeEdit(){
    document.getElementById("editModal").classList.remove("active");
}

/* ================= DELETE ================= */
function deleteVA(){
    trainers[currentTrainer].splice(selectedIndex,1);
    save();
    closeAction();
    render();
}

/* ================= SWITCH ================= */
function switchTrainer(t){
    currentTrainer = t;
    render();
}

/* INIT */
render();

</script>

</body>
</html>
