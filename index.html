<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #F8FAFC; /* MAIN BACKGROUND */
}

/* TOPBAR */
.topbar {
    background: linear-gradient(90deg, #6366F1, #4F46E5);
    color: white;
    padding: 16px;
    font-weight: 600;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 25%;
    background: #0F172A; /* SIDEBAR */
    color: #E2E8F0;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

/* BUTTONS */
.sidebar button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    background: transparent;
    border: 1px solid #334155;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.sidebar button:hover {
    background: #6366F1; /* PRIMARY ACTION */
    border-color: #6366F1;
}

/* TRAINER IMAGE */
.trainer-photo {
    margin-top: 20px;
    text-align: center;
}

.trainer-photo img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 16px;
    border: 2px solid #6366F1;
    transition: 0.3s ease;
    cursor: pointer;
}

.trainer-photo img:hover {
    transform: scale(1.05) rotate(-1deg);
    box-shadow: 0 15px 35px rgba(99,102,241,0.4);
}

/* PROFILE PANEL */
#trainerPanel {
    margin-top: 15px;
    padding: 12px;
    background: #111827;
    border-radius: 12px;
    display: none;
    color: white;
}

/* BADGES */
.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    margin-top: 5px;
}

.badge.red { background:#10B981; color:white; }   /* ACCENT */
.badge.blue { background:#6366F1; color:white; }
.badge.gold { background:#F59E0B; color:white; }

/* MAIN AREA */
.main {
    width: 75%;
    padding: 24px;
}

/* CARDS */
.card {
    background: #FFFFFF; /* CARD BACKGROUND */
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 6px 18px rgba(15,23,42,0.08);
}

/* INPUTS */
input, select {
    padding: 10px;
    margin: 8px 0;
    width: 280px;
    border-radius: 10px;
    border: 1px solid #CBD5E1;
    outline: none;
}

input:focus, select:focus {
    border-color: #6366F1;
}

/* BUTTON */
button {
    background: #6366F1; /* PRIMARY ACTION */
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}

/* SEATS */
.seat {
    background: #FFFFFF;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    min-height: 75px;
    border: 1px solid #E2E8F0;
    transition: 0.2s;
}

.seat:hover {
    transform: translateY(-3px);
    border-color: #6366F1;
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #0F172A;
    color: white;
    padding: 12px;
    border-left: 5px solid #6366F1;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15,23,42,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
}

.modal.active {
    display: flex;
}

.modal-box {
    background: white;
    width: 340px;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
}

/* ACTION BUTTONS */
.modal-box button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
}

.edit { background: #6366F1 !important; }
.move { background: #F59E0B !important; }
.delete { background: #EF4444 !important; }
.closeBtn { background: #64748B !important; }

</style>
</head>

<body>

<div class="topbar">VA Classroom Dashboard</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Trainer View</h3>

    <button onclick="switchTrainer('Au')">Au</button>
    <button onclick="switchTrainer('Chanie')">Chanie</button>
    <button onclick="switchTrainer('Leo')">Leo</button>

    <hr>

    <div id="occupancy">0/10 seats</div>

    <h4>Search VA</h4>
    <input id="searchBox" onkeydown="handleSearch(event)">

    <!-- TRAINER IMAGE -->
    <div class="trainer-photo">
        <img id="trainerImg" src="au.png">
        <p id="trainerName">Au</p>
    </div>

    <!-- PROFILE PANEL -->
    <div id="trainerPanel">
        <h4>Trainer Profile</h4>
        <div id="trainerBadge"></div>
        <div id="trainerCount"></div>

        <div style="background:#1f2937;height:10px;border-radius:10px;margin-top:6px;">
            <div id="bar" style="height:10px;width:0;background:#10B981;border-radius:10px;"></div>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
    <h3>Assign VA</h3>
    <input id="vaName" placeholder="VA Name">
    <input id="agency" placeholder="Agency">

    <select id="trainerSelect">
        <option>Au</option>
        <option>Chanie</option>
        <option>Leo</option>
    </select>

    <button onclick="assignVA()">Assign VA</button>
</div>

<div class="card">
    <h3 id="classTitle"></h3>
    <div class="grid" id="seatGrid"></div>
</div>

</div>
</div>

<!-- ACTION MODAL -->
<div id="actionModal" class="modal">
    <div class="modal-box">
        <h3 id="actionTitle"></h3>

        <button onclick="openEditName()" class="edit">Edit Name</button>
        <button onclick="openEditAgency()" class="edit">Edit Agency</button>
        <button onclick="openMove()" class="move">Move</button>
        <button onclick="deleteVA()" class="delete">Delete</button>
        <button onclick="closeAction()" class="closeBtn">Close</button>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-box">
        <h3>Edit</h3>

        <input id="modalName">
        <input id="modalAgency">

        <select id="modalTrainer" style="display:none;">
            <option>Au</option>
            <option>Chanie</option>
            <option>Leo</option>
        </select>

        <button onclick="confirmModal()">Save</button>
        <button class="closeBtn" onclick="closeEdit()">Cancel</button>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
/* JS REMAINS EXACTLY THE SAME AS YOUR LAST WORKING VERSION */
</script>

</body>
</html>
