<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
:root {
    --primary: #6366F1; /* Modern Indigo */
    --primary-hover: #4F46E5;
    --bg-main: #F8FAFC; /* Clean off-white */
    --sidebar-bg: #0F172A; /* Deep Navy */
    --text-dark: #1E293B;
    --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

body {
    margin: 0;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    background: var(--bg-main);
    color: var(--text-dark);
}

/* TOPBAR */
.topbar {
    background: #FFFFFF;
    color: var(--text-dark);
    padding: 12px 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 15px;
    border-bottom: 1px solid #E2E8F0;
}

.logo {
    height: 35px;
    width: auto;
    border-radius: 6px;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 280px;
    background: var(--sidebar-bg);
    color: #F1F5F9;
    padding: 24px;
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 10px rgba(0,0,0,0.05);
}

.sidebar h3, .sidebar h4 {
    color: #94A3B8;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.05em;
    margin-bottom: 15px;
}

.sidebar button {
    width: 100%;
    margin: 4px 0;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #F1F5F9;
    border-radius: 8px;
    text-align: left;
    cursor: pointer;
    transition: 0.2s;
}

.sidebar button:hover {
    background: var(--primary);
    border-color: var(--primary);
}

#occupancy {
    font-size: 14px;
    background: #1E293B;
    padding: 8px;
    border-radius: 6px;
    text-align: center;
    margin: 10px 0;
}

/* TRAINER PROFILE SECTION */
.trainer-photo {
    margin-top: auto;
    padding-top: 20px;
    text-align: center;
    border-top: 1px solid #334155;
}

.trainer-photo img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid var(--primary);
    cursor: pointer;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.trainer-photo img:hover {
    transform: scale(1.05);
}

/* MAIN CONTENT */
.main {
    flex-grow: 1;
    padding: 30px;
    overflow-y: auto;
}

.card {
    background: #FFFFFF;
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 24px;
    box-shadow: var(--card-shadow);
}

.card h3 {
    margin-top: 0;
    font-size: 18px;
    color: #334155;
}

/* FORM ELEMENTS */
input, select {
    padding: 12px;
    margin: 8px 0;
    width: 100%;
    max-width: 300px;
    border-radius: 8px;
    border: 1px solid #CBD5E1;
    background: #F8FAFC;
}

input:focus {
    outline: 2px solid var(--primary);
    border-color: transparent;
}

button {
    background: var(--primary);
    border: none;
    color: white;
    padding: 12px 24px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.2s;
}

button:hover {
    background: var(--primary-hover);
}

/* GRID & SEATS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
}

.seat {
    background: #FFFFFF;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    border: 1px solid #E2E8F0;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 90px;
}

.seat:hover {
    border-color: var(--primary);
    box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.1);
    transform: translateY(-2px);
}

.seat b {
    color: var(--text-dark);
    font-size: 16px;
}

.seat span {
    color: #64748B;
    font-size: 13px;
    margin-top: 4px;
}

/* TOAST */
.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--sidebar-bg);
    color: white;
    padding: 16px 24px;
    border-radius: 12px;
    opacity: 0;
    transition: 0.4s;
    z-index: 9999;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
}

.toast.show { opacity: 1; }

/* MODALS */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
}

.modal.active { display: flex; }

.modal-box {
    background: white;
    width: 360px;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
}

.modal-box button { width: 100%; margin: 8px 0; }

.edit { background: var(--primary) !important; }
.move { background: #8B5CF6 !important; }
.delete { background: #EF4444 !important; }
.closeBtn { background: #64748B !important; }

hr { border: 0; border-top: 1px solid #334155; margin: 20px 0; }
</style>
</head>

<body>

<div class="topbar">
    <img src="kling_20260422_VIDEO__1217_0.png" alt="Logo" class="logo">
    <span>VA Classroom Dashboard</span>
</div>

<div class="container">

    <div class="sidebar">
        <h3>Trainer View</h3>
        <button onclick="switchTrainer('Au')">Au</button>
        <button onclick="switchTrainer('Chanie')">Chanie</button>
        <button onclick="switchTrainer('Leo')">Leo</button>
        
        <hr>
        
        <div id="occupancy">0/10 seats</div>

        <h4>Search VA</h4>
        <input id="searchBox" onkeydown="handleSearch(event)" placeholder="Type & hit Enter..." style="width: 100%; max-width: 100%; box-sizing: border-box; background: #1E293B; border-color: #334155; color: white;">

        <div class="trainer-photo">
            <img id="trainerImg" src="au.png" onclick="showTrainerPanel()">
            <p id="trainerName" style="margin-top: 10px; font-weight: 600;"></p>
            <div id="trainerPanel" style="display:none; font-size: 13px; color: #94A3B8; margin-top: 10px;">
                <div id="trainerCount"></div>
                <div style="background:#334155;height:6px;border-radius:10px;margin-top:8px;">
                    <div id="bar" style="height:6px;width:0;background:var(--primary);border-radius:10px;transition: 0.5s;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h3>Assign New VA</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input id="vaName" placeholder="VA Name">
                <input id="agency" placeholder="Agency Name">
                <select id="trainerSelect">
                    <option>Au</option>
                    <option>Chanie</option>
                    <option>Leo</option>
                </select>
                <button onclick="assignVA()">Assign VA</button>
            </div>
        </div>

        <div class="card">
            <h3 id="classTitle" style="color: var(--primary); display: flex; align-items: center; gap: 10px;">
                </h3>
            <div class="grid" id="seatGrid"></div>
        </div>
    </div>
</div>

<div id="actionModal" class="modal">
    <div class="modal-box">
        <h3 id="actionTitle"></h3>
        <button onclick="openEditName()" class="edit">Edit Name</button>
        <button onclick="openEditAgency()" class="edit">Edit Agency</button>
        <button onclick="openMove()" class="move">Move VA</button>
        <button onclick="deleteVA()" class="delete">Remove VA</button>
        <button onclick="closeAction()" class="closeBtn">Cancel</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-box">
        <h3 id="editHeader">Edit</h3>
        <input id="modalSingleInput" style="max-width: 100%;">
        <select id="modalTrainer" style="display:none; max-width: 100%;">
            <option>Au</option>
            <option>Chanie</option>
            <option>Leo</option>
        </select>
        <button onclick="confirmModal()">Save Changes</button>
        <button class="closeBtn" onclick="closeEdit()">Cancel</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
let trainers = JSON.parse(localStorage.getItem("va_data")) || {
    Au: [],
    Chanie: [],
    Leo: []
};

let currentTrainer = "Au";
let selectedIndex = null;
let mode = "";

const trainerImages = {
    Au: "au.png",
    Chanie: "chanie.png",
    Leo: "leo.png"
};

function save() {
    localStorage.setItem("va_data", JSON.stringify(trainers));
}

function toast(msg) {
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
}

function updateTrainerUI() {
    document.getElementById("trainerImg").src = trainerImages[currentTrainer];
    document.getElementById("trainerName").innerText = currentTrainer;
    showTrainerPanel(); // Updates the progress bar automatically
}

function showTrainerPanel() {
    let count = trainers[currentTrainer].length;
    let percent = (count / 10) * 100;
    document.getElementById("trainerPanel").style.display = "block";
    document.getElementById("trainerCount").innerText = `Managed VAs: ${count}/10`;
    document.getElementById("bar").style.width = percent + "%";
}

function switchTrainer(t) {
    currentTrainer = t;
    updateTrainerUI();
    render();
}

function assignVA() {
    let name = document.getElementById("vaName").value;
    let agency = document.getElementById("agency").value;
    let trainer = document.getElementById("trainerSelect").value;
    if(!name || !agency) return toast("⚠️ Please fill in all fields");
    
    if(trainers[trainer].length >= 10) return toast("❌ Class is full!");

    trainers[trainer].push({ name, agency });
    save();
    render();
    toast("✅ VA successfully assigned");
    document.getElementById("vaName").value = "";
    document.getElementById("agency").value = "";
}

function handleSearch(e) {
    if (e.key === "Enter") searchVA(e.target.value);
}

function searchVA(q) {
    q = q.toLowerCase();
    for (let t in trainers) {
        for (let i = 0; i < trainers[t].length; i++) {
            if (trainers[t][i].name.toLowerCase().includes(q)) {
                currentTrainer = t;
                updateTrainerUI();
                render();
                return;
            }
        }
    }
    toast("🔍 No VA found with that name");
}

function render() {
    let grid = document.getElementById("seatGrid");
    grid.innerHTML = "";
    let list = trainers[currentTrainer];
    document.getElementById("classTitle").innerHTML = `Classroom: ${currentTrainer}`;
    let filled = 0;

    for (let i = 0; i < 10; i++) {
        let seat = document.createElement("div");
        seat.className = "seat";
        let va = list[i];
        if (va) {
            seat.innerHTML = `<b>${va.name}</b><span>${va.agency}</span>`;
            seat.onclick = () => openAction(i);
            filled++;
        } else {
            seat.style.background = "#F1F5F9";
            seat.style.borderStyle = "dashed";
            seat.innerHTML = "<span style='color:#94A3B8'>Empty Seat</span>";
        }
        grid.appendChild(seat);
    }
    document.getElementById("occupancy").innerText = `${filled} / 10 Seats Occupied`;
}

function openAction(i){ 
    selectedIndex=i; 
    document.getElementById("actionModal").classList.add("active"); 
    document.getElementById("actionTitle").innerText=trainers[currentTrainer][i].name; 
}

function closeAction(){ document.getElementById("actionModal").classList.remove("active"); }

function deleteVA(){ 
    trainers[currentTrainer].splice(selectedIndex,1); 
    save(); render(); closeAction(); toast("🗑️ VA removed"); 
}

function openEditName(){ 
    mode="name"; 
    document.getElementById("editHeader").innerText = "Update VA Name";
    document.getElementById("modalSingleInput").style.display = "block";
    document.getElementById("modalSingleInput").value = trainers[currentTrainer][selectedIndex].name;
    document.getElementById("modalTrainer").style.display = "none";
    document.getElementById("editModal").classList.add("active"); 
    closeAction(); 
}

function openEditAgency(){ 
    mode="agency"; 
    document.getElementById("editHeader").innerText = "Update Agency";
    document.getElementById("modalSingleInput").style.display = "block";
    document.getElementById("modalSingleInput").value = trainers[currentTrainer][selectedIndex].agency;
    document.getElementById("modalTrainer").style.display = "none";
    document.getElementById("editModal").classList.add("active"); 
    closeAction(); 
}

function openMove(){ 
    mode="move"; 
    document.getElementById("editHeader").innerText = "Transfer to Another Trainer";
    document.getElementById("modalSingleInput").style.display = "none";
    document.getElementById("modalTrainer").style.display = "block";
    document.getElementById("editModal").classList.add("active"); 
    closeAction(); 
}

function confirmModal(){
    let va = trainers[currentTrainer][selectedIndex];
    let val = document.getElementById("modalSingleInput").value;
    if(mode==="name") va.name = val;
    if(mode==="agency") va.agency = val;
    if(mode==="move"){
        let t = document.getElementById("modalTrainer").value;
        if(trainers[t].length >= 10) return toast("❌ Target class is full!");
        trainers[t].push(va);
        trainers[currentTrainer].splice(selectedIndex,1);
    }
    save(); render(); closeEdit(); toast("✨ Changes saved");
}

function closeEdit(){ document.getElementById("editModal").classList.remove("active"); }

updateTrainerUI();
render();
</script>

</body>
</html>
