<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #FFF5F5; /* MAIN BACKGROUND */
    color: #450A0A;
}

.topbar {
    background: linear-gradient(90deg, #E11D48, #be123c);
    color: white;
    padding: 16px;
    font-weight: 600;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 25%;
    background: #2D0A0A; /* SIDEBAR */
    color: #FFF5F5;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    background: transparent;
    border: 1px solid #7f1d1d;
    color: #FFF5F5;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.sidebar button:hover {
    background: #E11D48; /* PRIMARY */
    border-color: #E11D48;
}

/* TRAINER IMAGE */
.trainer-photo {
    margin-top: 20px;
    text-align: center;
}

.trainer-photo img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 16px;
    border: 2px solid #E11D48;
    transition: 0.3s ease;
    cursor: pointer;
}

.trainer-photo img:hover {
    transform: scale(1.05) rotate(-1deg);
    box-shadow: 0 15px 35px rgba(225,29,72,0.4);
}

/* PROFILE PANEL */
#trainerPanel {
    margin-top: 15px;
    padding: 12px;
    background: #450A0A;
    border-radius: 12px;
    display: none;
    color: #FFF5F5;
}

/* BADGES */
.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    margin-top: 5px;
}

.badge.red { background:#E11D48; color:white; }
.badge.blue { background:#7c3aed; color:white; }
.badge.gold { background:#f59e0b; color:white; }

/* MAIN */
.main {
    width: 75%;
    padding: 24px;
    color: #450A0A;
}

/* CARD */
.card {
    background: #FFFFFF;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 6px 18px rgba(69,10,10,0.08);
}

/* INPUT */
input, select {
    padding: 10px;
    margin: 8px 0;
    width: 280px;
    border-radius: 10px;
    border: 1px solid #fecdd3;
    color: #450A0A;
}

input:focus, select:focus {
    outline: none;
    border-color: #E11D48;
}

/* BUTTON */
button {
    background: #E11D48; /* PRIMARY */
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}

/* SEAT */
.seat {
    background: #FFFFFF;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    min-height: 75px;
    border: 1px solid #fecdd3;
}

.seat:hover {
    transform: translateY(-3px);
    border-color: #E11D48;
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2D0A0A;
    color: #FFF5F5;
    padding: 12px;
    border-left: 5px solid #E11D48;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(45,10,10,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
}

.modal.active {
    display: flex;
}

.modal-box {
    background: #FFFFFF;
    width: 340px;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
    color: #450A0A;
}

/* ACTION BUTTONS */
.modal-box button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
}

.edit { background: #E11D48 !important; }
.move { background: #7c3aed !important; }
.delete { background: #dc2626 !important; }
.closeBtn { background: #450A0A !important; }
</style>
</head>

<body>

<div class="topbar">VA Classroom Dashboard</div>

<div class="container">

<div class="sidebar">
    <h3>Trainer View</h3>

    <button onclick="switchTrainer('Au')">Au</button>
    <button onclick="switchTrainer('Chanie')">Chanie</button>
    <button onclick="switchTrainer('Leo')">Leo</button>

    <hr>

    <div id="occupancy">0/10 seats</div>

    <h4>Search VA</h4>
    <input id="searchBox" onkeydown="handleSearch(event)">

    <div class="trainer-photo">
        <img id="trainerImg" src="au.png">
        <p id="trainerName">Au</p>
    </div>

    <div id="trainerPanel">
        <h4>Trainer Profile</h4>
        <div id="trainerBadge"></div>
        <div id="trainerCount"></div>

        <div style="background:#7f1d1d;height:10px;border-radius:10px;margin-top:6px;">
            <div id="bar" style="height:10px;width:0;background:#E11D48;border-radius:10px;"></div>
        </div>
    </div>
</div>

<div class="main">

<div class="card">
    <h3>Assign VA</h3>
    <input id="vaName" placeholder="VA Name">
    <input id="agency" placeholder="Agency">

    <select id="trainerSelect">
        <option>Au</option>
        <option>Chanie</option>
        <option>Leo</option>
    </select>

    <button onclick="assignVA()">Assign VA</button>
</div>

<div class="card">
    <h3 id="classTitle"></h3>
    <div class="grid" id="seatGrid"></div>
</div>

</div>
</div>

<!-- MODALS + SCRIPT (UNCHANGED LOGIC) -->
<div id="actionModal" class="modal">
    <div class="modal-box">
        <h3 id="actionTitle"></h3>
        <button onclick="openEditName()" class="edit">Edit Name</button>
        <button onclick="openEditAgency()" class="edit">Edit Agency</button>
        <button onclick="openMove()" class="move">Move</button>
        <button onclick="deleteVA()" class="delete">Delete</button>
        <button onclick="closeAction()" class="closeBtn">Close</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-box">
        <h3>Edit</h3>
        <input id="modalName">
        <input id="modalAgency">
        <select id="modalTrainer" style="display:none;">
            <option>Au</option>
            <option>Chanie</option>
            <option>Leo</option>
        </select>
        <button onclick="confirmModal()">Save</button>
        <button class="closeBtn" onclick="closeEdit()">Cancel</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* KEEP YOUR ORIGINAL JS EXACTLY AS IT IS */
</script>

</body>
</html>
